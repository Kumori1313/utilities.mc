<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>utilities.mc</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <nav id="tabs">
    <span class="brand">utilities.mc</span>
    <button data-tab="map" class="active">Seed map</button>
    <button data-tab="enchant">Enchant</button>
    <button data-tab="portal">Portal</button>
    <span class="ver">Minecraft <strong id="mcver">1.21.3</strong></span>
  </nav>

  <!-- Seed map: a 2D biome canvas (default) and a 3D mesh canvas, one shown at a time -->
  <section id="view-map" class="view active">
    <canvas id="view2d"></canvas>
    <canvas id="view3d" class="hidden"></canvas>
    <div id="panel">
      <div id="map-mode" class="seg">
        <button data-mode="2d" class="active">2D</button>
        <button data-mode="3d">3D</button>
      </div>
      <p class="version">World generation differs between versions, so this map is only
        correct for the pinned one.</p>
      <label class="fld">seed <input id="seed" value="1" spellcheck="false"></label>
      <div class="coords">
        <label class="fld">x <input id="cx" value="0" inputmode="numeric"></label>
        <label class="fld">z <input id="cz" value="0" inputmode="numeric"></label>
      </div>
      <button id="go">load</button>
      <label id="rdist-wrap" class="hidden">render distance
        <input id="rdist" type="range" min="1" max="8" value="3">
        <span id="rdist-val">3</span></label>
      <div id="structs">
        <div class="sect">structures</div>
        <div id="struct-list"></div>
        <p class="hint" id="struct-hint"></p>
        <div class="sect">locate nearest</div>
        <div class="locate">
          <select id="loc-type"></select>
          <select id="loc-n">
            <option value="1">1</option>
            <option value="4" selected>4</option>
            <option value="8">8</option>
          </select>
          <button id="loc-go">find</button>
          <button id="loc-clear" title="clear">×</button>
        </div>
        <p class="hint" id="loc-out"></p>
      </div>
      <div id="status">starting…</div>
      <dl id="stats"></dl>
      <p class="hint" id="map2d-hint">drag to pan · scroll to zoom (toward cursor) · hover to read biome</p>
      <p class="hint hidden" id="map3d-hint">drag to orbit · scroll to zoom · right-drag to pan</p>
      <p class="hint" id="hover">—</p>
    </div>
  </section>

  <!-- Calculator panels: form-based, scrollable -->
  <section id="view-enchant" class="view form-view"></section>
  <section id="view-portal" class="view form-view"></section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
